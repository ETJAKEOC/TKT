name: Build Fedora kernel
on:
  workflow_call:
    inputs:
      _cpusched:
        required: true
        type: string

env:
  _processor_opt: "x86-64"
  _distro: "Fedora"
  _git_mirror: "gregkh"
  _logging_use_script: "no"
  _install_after_building: "no"
  _debugdisable: "true"
  _noccache: "true"
  _STRIP: "true"
  _kernel_on_diet: "true"
  _kernel_work_folder: "/tmp"
  _kernel_source_folder: "/tmp"
  # _modprobeddb: "true"
  _modprobeddb_db_path: ${{ github.workspace }}/modprobed.db
  _nofallback: "false"

jobs:
  build-kernel:
    env:
      _cpusched: ${{ inputs._cpusched }}

    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install initial dependencies
        run: dnf install --skip-unavailable git gawk clang llvm lld wget xz openssl-devel-engine hostname perl bison ccache curl \
          dwarves elfutils-devel elfutils-libelf-devel fedora-packager fedpkg flex gcc-c++ git libXi-devel lz4 make ncurses-devel \
          openssl openssl-devel perl-devel perl-generators pesign python3-devel qt5-qtbase-devel rpm-build rpmdevtools \
          schedtool zstd bc rsync -y

      - name: Checkout TKT
        uses: actions/checkout@v4

      - name: fix git folder ownership
        run: git config --global --add safe.directory `pwd`

      - name: run git status
        run: git status

      - name: Install deps and compile kernel
        env:
          KCFLAGS: "-Wno-error=unused-command-line-argument"
        run: yes '' | ./install.sh install

      - name: Cleanup useless RPM files
        run: rm -rf RPMS/*kernel-headers*.rpm

      - name: rename kernel config
        run: mv kernelconfig.new kernelconfig.fedora.${{ env._cpusched }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: fedora-kernel-packages-${{ env._cpusched }}
          path: |
            RPMS/*.rpm
            kernelconfig*.txt
