name: Build archlinux kernel

on:
  workflow_call:
    inputs:
      _cpusched:
        required: true
        type: string

env:
  _processor_opt: "generic"
  _git_mirror: "github.com"
  PKGDEST: "/tmp/TKT"
  _debugdisable: "true"
  _noccache: "false"
  _STRIP: "true"
  _kernel_on_diet: "false"
  _kernel_work_folder: "/tmp"
  _kernel_source_folder: "/tmp"
  # _modprobeddb: "true"
  _modprobeddb_db_path: ${{ github.workspace }}/modprobed.db

jobs:
  build_kernel_ubuntu:
    name: Build Kernel on Ubuntu
    env:
      _cpusched: ${{ inputs._cpusched }}
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install git
        run: pacman -Syu --noconfirm git
      - name: Checkout main
        uses: actions/checkout@v4
      - name: Prepare for makepkg
        run: |
          pacman -Syu --noconfirm base-devel sudo clang llvm lld
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
      - name: Compile Kernel
        run: |
          su user -c "yes '' | makepkg --noconfirm -s"
      - name: Rename kernel config
        run: mv kernelconfig.new "kernelconfig.arch.${{ env._cpusched }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: arch-kernel-packages-${{ env._cpusched }}
          path: |
            ${{ env.PKGDEST }}/*.pkg.tar*
            kernelconfig*.txt

  build_kernel_self_hosted:
    name: Build Kernel on Self-Hosted
    env:
      _cpusched: ${{ inputs._cpusched }}
    runs-on: self-hosted
    container: archlinux:latest

    steps:
      - name: Install git
        run: pacman -Syu --noconfirm git
      - name: Checkout main
        uses: actions/checkout@v4
      - name: Prepare for makepkg
        run: |
          pacman -Syu --noconfirm base-devel sudo clang llvm lld
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
      - name: Compile Kernel
        run: |
          su user -c "yes '' | makepkg --noconfirm -s"
      - name: Rename kernel config
        run: mv kernelconfig.new "kernelconfig.arch.${{ env._cpusched }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: arch-kernel-packages-${{ env._cpusched }}
          path: |
            ${{ env.PKGDEST }}/*.pkg.tar*
            kernelconfig*.txt
